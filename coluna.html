<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Colunas e opinião do Correio da Manhã."
        />
        <title>Colunas | CM</title>
        <link rel="stylesheet" href="css/styles.css" />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,400&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />

        <script src="js/components/Header.js"></script>
        <script src="js/components/Footer.js"></script>
        <script src="js/components/MainLayout.js"></script>
        <script src="js/components/MobileMenu.js"></script>
    </head>

    <body>
        <div id="global-header"></div>

        <main class="main-content category-view column-page-shell" id="column-page">
            <div class="container">
                <div class="page-header">
                    <h1 id="column-page-title">Correio Político</h1>
                    <p id="column-page-description">
                        Análises, bastidores e leituras editoriais do Correio da
                        Manhã.
                    </p>
                </div>

                <div class="opinion-highlights-grid">
                    <div id="column-featured-highlight"></div>
                    <div
                        class="opinion-highlights-stack"
                        id="column-secondary-highlights"
                    ></div>
                </div>

                <div class="opinion-grid" id="colunas-grid"></div>

                <div class="load-more-container">
                    <div class="loading-spinner" id="loading-spinner"></div>
                    <button class="load-more-btn" id="load-more-btn">
                        Carregar mais colunas
                    </button>
                </div>
            </div>
        </main>

        <div id="global-footer"></div>

        <script src="js/mock-data.js"></script>
        <script src="js/column-page.js"></script>
        <script src="js/main.js"></script>
    </body>
</html>

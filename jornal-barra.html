<!doctype html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jornal da Barra - Notícias da Barra da Tijuca</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/regional-headers.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="js/components/TinyHeader.js"></script>
    <script src="js/components/ProductHeader.js"></script>
    <script src="js/components/RegionalNews.js"></script>
    <script src="js/components/MobileMenu.js"></script>
    <script src="js/main.js"></script>
</head>

<body class="has-regional-headers theme-barra">
    <!-- Product Header -->
    <div id="product-header" data-product-name="Jornal da Barra" data-product-short-name="Barra"
        data-product-color="#1A1A1A" data-product-url="jornal-barra.html"></div>

    <!-- Regional News Container -->
    <div id="regional-news-container"></div>

    <script>
        // Initialize all components
        document.addEventListener("DOMContentLoaded", function () {
            TinyHeader.render();
            ProductHeader.render();
            RegionalNews.render("barra");
            // Initialize MobileMenu listeners
            if (window.CM && window.CM.MobileMenu) window.CM.MobileMenu.init();
        });
    </script>
        <script src="js/mock-data.js"></script>
        <script src="js/data-loader.js"></script>
</body>

</html>

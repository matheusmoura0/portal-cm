<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Jornal de Turismo - Notícias de Turismo</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="stylesheet" href="css/regional-headers.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <script src="js/components/TinyHeader.js"></script>
        <script src="js/components/ProductHeader.js"></script>
        <script src="js/components/RegionalNews.js"></script>
    </head>

    <body class="has-regional-headers theme-turismo">
        <!-- Product Header -->
        <div
            id="product-header"
            data-product-name="Jornal de Turismo"
            data-product-short-name="TURISMO"
            data-product-color="#00853e"
            data-product-url="jornal-turismo.html"
        ></div>

        <!-- Regional News Container -->
        <div id="regional-news-container"></div>

        <script>
            // Initialize all components
            document.addEventListener("DOMContentLoaded", function () {
                TinyHeader.render();
                ProductHeader.render();
                RegionalNews.render("turismo");
            });
        </script>
        <script src="js/mock-data.js"></script>
        <script src="js/data-loader.js"></script>
    </body>
</html>

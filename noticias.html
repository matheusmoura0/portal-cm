<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Notícias - portal CM. Visualize todas as notícias por categoria, data e popularidade."
        />
        <title>Todas as Notícias | portal CM</title>
        <link rel="stylesheet" href="css/styles.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&family=Noto+Serif:ital,wght@0,400;0,700;0,900;1,400&display=swap"
            rel="stylesheet"
        />
        <script src="js/components/Header.js"></script>
        <script src="js/components/Footer.js"></script>
        <script src="js/components/MainLayout.js"></script>
    </head>

    <body>
        <!-- Global Header Placeholder -->
        <div id="global-header"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="container">
                <!-- Page Header -->
                <div class="news-page-header">
                    <div>
                        <h1 class="news-page-title">Todas as Notícias</h1>
                        <p class="news-page-subtitle">
                            Explore todas as notícias do portal CM
                        </p>
                    </div>
                    <div class="news-filters">
                        <div class="filter-group">
                            <span class="filter-label">Ordenar por:</span>
                            <select class="sort-select" id="sort-select">
                                <option value="recent">Mais recentes</option>
                                <option value="popular">Mais populares</option>
                                <option value="oldest">Mais antigas</option>
                            </select>
                        </div>
                        <div class="view-toggle">
                            <button
                                class="view-btn active"
                                id="grid-view-btn"
                                aria-label="Visualização em grade"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <rect
                                        x="3"
                                        y="3"
                                        width="7"
                                        height="7"
                                    ></rect>
                                    <rect
                                        x="14"
                                        y="3"
                                        width="7"
                                        height="7"
                                    ></rect>
                                    <rect
                                        x="14"
                                        y="14"
                                        width="7"
                                        height="7"
                                    ></rect>
                                    <rect
                                        x="3"
                                        y="14"
                                        width="7"
                                        height="7"
                                    ></rect>
                                </svg>
                            </button>
                            <button
                                class="view-btn"
                                id="list-view-btn"
                                aria-label="Visualização em lista"
                            >
                                <svg
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    stroke="currentColor"
                                    stroke-width="2"
                                >
                                    <line x1="8" y1="6" x2="21" y2="6"></line>
                                    <line x1="8" y1="12" x2="21" y2="12"></line>
                                    <line x1="8" y1="18" x2="21" y2="18"></line>
                                    <line x1="3" y1="6" x2="3.01" y2="6"></line>
                                    <line
                                        x1="3"
                                        y1="12"
                                        x2="3.01"
                                        y2="12"
                                    ></line>
                                    <line
                                        x1="3"
                                        y1="18"
                                        x2="3.01"
                                        y2="18"
                                    ></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Category Pills -->
                <div class="category-pills">
                    <button class="category-pill active" data-category="all">
                        Todas
                    </button>
                    <button class="category-pill" data-category="politica">
                        Política
                    </button>
                    <button class="category-pill" data-category="economia">
                        Economia
                    </button>
                    <button class="category-pill" data-category="esportes">
                        Esportes
                    </button>
                    <button class="category-pill" data-category="cultura">
                        Cultura
                    </button>
                    <button class="category-pill" data-category="justica">
                        Justiça
                    </button>
                    <button class="category-pill" data-category="brasil">
                        Brasil
                    </button>
                    <button class="category-pill" data-category="mundo">
                        Mundo
                    </button>
                </div>

                <!-- Results Info -->
                <div class="news-results-info">
                    <span class="results-count">
                        Mostrando <strong id="results-count">12</strong> de
                        <strong id="total-count">48</strong> notícias
                    </span>
                    <div class="filter-group">
                        <select class="sort-select" id="sort-select-inline">
                            <option value="recent">Mais recentes</option>
                            <option value="popular">Mais populares</option>
                            <option value="oldest">Mais antigas</option>
                        </select>
                    </div>
                </div>

                <!-- News Container -->
                <div id="news-container" class="news-grid-view">
                    <div class="loading-spinner">Carregando notícias...</div>
                </div>

                <!-- Load More -->
                <div class="load-more-container">
                    <button class="load-more-btn" id="load-more-btn">
                        Carregar mais notícias
                    </button>
                </div>
            </div>
        </main>

        <!-- Global Footer Placeholder -->
        <div id="global-footer"></div>

        <!-- Back to Top Button -->
        <button
            id="back-to-top"
            class="back-to-top"
            aria-label="Voltar ao topo"
        >
            <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
            >
                <polyline points="18 15 12 9 6 15"></polyline>
            </svg>
        </button>

        <script src="js/mock-data.js"></script>
        <script src="js/data-loader.js"></script>
        <script src="js/main.js"></script>
        <script src="js/news-page.js"></script>
    </body>
</html>
